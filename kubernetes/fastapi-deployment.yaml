apiVersion: apps/v1
kind: Deployment

metadata:
    name: fastapi-app

    spec:
        replicas: 2

            selector:
                  matchLabels:
                          app: fastapi-app

                              template:
                                    metadata:
                                            labels:
                                                      app: fastapi-app

                                                            spec:
                                                                    containers:
                                                                            - name: fastapi-app

                                                                                      image: 738605694660.dkr.ecr.ap-south-1.amazonaws.com/fastapi-app:latest

                                                                                                ports:
                                                                                                          - containerPort: 8000

                                                                                                                    resources:
                                                                                                                                requests:
                                                                                                                                              cpu: "200m"
                                                                                                                                                            memory: "256Mi"
                                                                                                                                                                        limits:
                                                                                                                                                                                      cpu: "500m"
                                                                                                                                                                                                    memory: "512Mi"
