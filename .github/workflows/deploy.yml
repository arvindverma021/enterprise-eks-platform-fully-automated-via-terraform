name: Deploy FastAPI to EKS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: fastapi-app
  EKS_CLUSTER_NAME: enterprise-eks

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}


    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Run Trivy Filesystem Scan
      uses: aquasecurity/trivy-action@0.28.0
      with:
        scan-type: 'fs'
        scan-ref: './app'
        format: 'table'
        exit-code: '1'
        severity: 'HIGH,CRITICAL'

    - name: Build Docker Image
      run: |
        docker build -t $ECR_REPOSITORY ./app

    - name: Run Trivy Image Scan
      uses: aquasecurity/trivy-action@0.28.0
      with:
        image-ref: '${{ env.ECR_REPOSITORY }}:latest'
        format: 'table'
        exit-code: '1'
        severity: 'HIGH,CRITICAL'


    - name: Tag Image
      run: |
        docker tag $ECR_REPOSITORY:latest \
        ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:latest

    - name: Push Image
      run: |
        docker push \
        ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:latest

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --region $AWS_REGION \
          --name $EKS_CLUSTER_NAME

    - name: Deploy to EKS
      run: |
        kubectl set image deployment/fastapi-app \
        fastapi-app=${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:latest

        kubectl rollout status deployment/fastapi-app
